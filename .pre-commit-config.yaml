repos:
  - repo: local
    hooks:
      # Python linting and formatting
      - id: ruff
        name: ruff
        entry: ruff check --ignore E712
        language: system
        types: [python]
        pass_filenames: true
        exclude: ^cmake/pybind11/

      - id: black
        name: black
        entry: black --check
        language: system
        types: [python]
        pass_filenames: true
        exclude: ^cmake/pybind11/

      - id: isort
        name: isort
        entry: isort -c
        language: system
        types: [python]
        pass_filenames: true
        exclude: ^cmake/pybind11/

      # Spell checking
      - id: codespell
        name: codespell
        entry: codespell
        language: system
        pass_filenames: true
        args:
          - --ignore-words=codespell_ignore_words.txt
          - --exclude-file=codespell.txt
        exclude: |
          (?x)^(
            .*\.onnx|
            .*\.min\.js|
            .*\.min\.js\.map|
            tutorials/pretrained_foundational_models/self_supervised_training/Contrastive_learning_Notebook\.ipynb|
            applications/holochat/models/.*
          )$

      # C++ linting and formatting
      - id: cpplint
        name: cpplint
        entry: python -m cpplint --quiet
        language: system
        types_or: [c, c++]
        exclude: ^applications/holoviz/template/cookiecutter
        pass_filenames: true

      # CMake linting
      - id: cmakelint
        name: cmakelint
        entry: cmakelint --filter=-whitespace/indent,-linelength,-readability/wonkycase,-convention/filename,-package/stdargs
        language: system
        files: (CMakeLists\.txt|\.cmake)$
        pass_filenames: true
        exclude: (^build|^install|^data|^\.)

      # Fix hooks - only run when --fix is passed (holohub lint --fix)
      - id: ruff-fix
        name: ruff (fix)
        entry: ruff check --fix --ignore E712
        language: system
        types: [python]
        pass_filenames: true
        stages: [manual]
        exclude: ^cmake/pybind11/

      - id: black-fix
        name: black (fix)
        entry: black
        language: system
        types: [python]
        pass_filenames: true
        stages: [manual]
        exclude: ^cmake/pybind11/

      - id: isort-fix
        name: isort (fix)
        entry: isort
        language: system
        types: [python]
        pass_filenames: true
        stages: [manual]
        exclude: ^cmake/pybind11/
