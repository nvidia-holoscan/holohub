[pytest]
testpaths = tests/python

addopts = --tb=short -v -p no:cacheprovider

log_cli = true
log_cli_level = INFO
log_format = %(levelname)s %(name)s:%(lineno)d — %(message)s

markers =
    requires_gpu: test runs a live Holoscan pipeline and needs a GPU

timeout = 300

# PYTHONPATH is resolved by conftest.py via the {{ cookiecutter.module_slug | upper }}_BUILD_DIR
# environment variable (injected by CTest automatically).
# Manual invocation: {{ cookiecutter.module_slug | upper }}_BUILD_DIR=build pytest
