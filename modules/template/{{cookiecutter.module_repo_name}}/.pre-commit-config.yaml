# Run `pre-commit install` once, then hooks run on every commit.
# Run `pre-commit run --all-files` to lint the whole tree.
# Run `pre-commit autoupdate` to refresh to latest compatible versions.

# Build outputs, dev-container HOME junk, and the cmake/ helpers copied in from
# the HoloHub clone (vendored, not maintained here) are excluded from all hooks.
exclude: '^(build[^/]*|install[^/]*|dist|\.cache|\.local|\.cupy|_CPack_Packages|cmake)/'

repos:
  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending

  # Python: ruff (lint + format) — configured in pyproject.toml
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Spelling
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --write-changes
          - --ignore-words=codespell_ignore_words.txt
          - --exclude-file=codespell.txt

  # C++: cpplint
  - repo: https://github.com/cpplint/cpplint
    rev: 2.0.2
    hooks:
      - id: cpplint
        # Line width is owned by clang-format (ColumnLimit 100); TODO markers in
        # the generated stubs intentionally omit a username.
        args: [--quiet, --filter=-readability/todo,-whitespace/line_length]

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args: [--fix, --config, .markdownlint.yaml, --ignore-path, .markdownlintignore]

  # CMake, metadata, and copyright headers (local hooks)
  - repo: local
    hooks:
      - id: holoscan-metadata-validate
        name: validate metadata.json against the Holoscan CLI schema
        entry: python3 .github/workflows/scripts/validate_metadata.py
        language: system
        files: '(^|/)metadata\.json$'
        pass_filenames: false

      - id: cmakelint
        name: cmakelint
        entry: cmakelint
        language: python
        additional_dependencies: ["cmakelint==1.4.3"]
        args:
          - --filter=-whitespace/indent,-linelength,-readability/wonkycase,-convention/filename,-package/stdargs
        files: '(^|/)CMakeLists\.txt$|\.cmake$'

      - id: check-copyright
        name: check-copyright
        entry: python3 .github/workflows/scripts/check_copyright.py
        args:
          - .
          - --git-modified-only
          - --exclude-config
          - .github/workflows/scripts/copyright_excludes.txt
          - --update-current-year
        language: system
        pass_filenames: false
