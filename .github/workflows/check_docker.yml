name: Check Docker

on:
  pull_request:
    branches: [main, holoscan-sdk-lws2]
  push:
    branches: [main, holoscan-sdk-lws2]

permissions:
  contents: read

env:
  HOLOSCAN_CLI_INSTALL_ARGS: "--pre --extra-index-url https://pypi.nvidia.com holoscan-cli>4.2.0"

jobs:
  check-docker-build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            ubuntu_version: 22.04
          - runner: ubuntu-24.04
            ubuntu_version: 24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Docker build
        run: |
          export ubuntu_version=${{ matrix.ubuntu_version }}

          ./holohub build-container --base-img ubuntu:${ubuntu_version}

  # Regression test for the wrapper's in-container provisioning path
  # (holohub#1635): per-application Dockerfiles run `holohub setup` on bare
  # base images with no preinstalled CLI and no python3-venv. The top-level
  # Dockerfile built above preinstalls the CLI, so it never exercises this
  # path. The package source is pinned by HOLOSCAN_CLI_INSTALL_ARGS, the same
  # resolution every other check-cli job uses.
  check-docker-bare-bootstrap:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Bootstrap the CLI on a bare container image
        run: |
          docker build \
            --build-arg "HOLOSCAN_CLI_INSTALL_ARGS=${HOLOSCAN_CLI_INSTALL_ARGS}" \
            -f utilities/cli/tests/Dockerfile.bare_bootstrap .
