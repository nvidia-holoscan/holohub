name: Check CLI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, holoscan-sdk-lws2]

permissions:
  contents: read

env:
  HOLOSCAN_CLI_INSTALL_ARGS: "--pre --extra-index-url https://pypi.nvidia.com holoscan-cli>4.2.0"

jobs:
  check-cli-py:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Checkout Repository
        uses: actions/checkout@v4

      # HoloHub-owned check dependencies live in
      # utilities/requirements.check-cli.txt; holoscan-cli itself is resolved
      # from NVIDIA PyPI.
      - name: Install holoscan-cli
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
              ${HOLOSCAN_CLI_INSTALL_ARGS} \
              -r utilities/requirements.check-cli.txt

      # Verify the wrapper + holoscan-cli contract on HoloHub's project tree.
      - name: Run wrapper consolidation test
        run: python -m pytest -v --noconftest utilities/cli/tests/test_holoscan_cli_consolidation.py

  check-cli-ctest:
    runs-on: ubuntu-22.04
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      # ctest invokes `python -m pytest` on the smoke tests; keep the
      # HoloHub-owned test and template dependencies in one requirements file.
      - name: Install holoscan-cli
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
              ${HOLOSCAN_CLI_INSTALL_ARGS} \
              -r utilities/requirements.check-cli.txt

      - name: Configure CMake with testing enabled
        run: |
          cmake -B build -DBUILD_TESTING=ON -DBUILD_HOLOHUB_TESTING=ON .

      - name: Run CMake tests
        run: |
          cd build
          ctest --verbose

  # Exercise the same smoke test against a *source checkout*
  # of holoscan-cli (https://github.com/nvidia-holoscan/holoscan-cli) rather
  # than the NVIDIA PyPI wheel. This catches breakage when an in-flight
  # holoscan-cli change lands ahead of a new release candidate.
  check-cli-source:
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Checkout HoloHub
        uses: actions/checkout@v4

      # Full history so poetry-dynamic-versioning can derive a version from
      # git tags when building the source checkout.
      - name: Checkout holoscan-cli source
        uses: actions/checkout@v4
        with:
          repository: nvidia-holoscan/holoscan-cli
          path: holoscan-cli-src
          fetch-depth: 0

      - name: Install holoscan-cli from source
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
              -r utilities/requirements.check-cli.txt \
              ./holoscan-cli-src

      # ``HOLOSCAN_CLI_SOURCE`` mirrors the developer workflow documented in
      # the ``holohub`` wrapper: PYTHONPATH gets ``<source>/src`` prepended so
      # the *checkout* is imported, not the installed copy.
      - name: Run wrapper consolidation test against source checkout
        env:
          HOLOSCAN_CLI_SOURCE: ${{ github.workspace }}/holoscan-cli-src
        run: python -m pytest -v --noconftest utilities/cli/tests/test_holoscan_cli_consolidation.py

      # Execute one inexpensive named setup script as the ordinary runner
      # user. This covers the script's per-operation sudo contract in addition
      # to the default setup dry-run exercised by the consolidation suite.
      - name: Run non-root host setup script
        env:
          CLI_SOURCE: ${{ github.workspace }}/holoscan-cli-src
          USER_HOME: ${{ runner.temp }}/holohub-user
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y python3-venv
          mkdir -p "${USER_HOME}"
          run_as_user() {
            HOME="${USER_HOME}" \
              PATH="/usr/sbin:/usr/bin:/sbin:/bin" \
              HOLOSCAN_CLI_SOURCE="${CLI_SOURCE}" \
              HOLOSCAN_CLI_VENV="${USER_HOME}/cli-venv" \
              "$@"
          }
          run_as_user ./holohub setup --scripts xvfb --dryrun
          run_as_user ./holohub setup --scripts xvfb
          command -v xvfb-run

      # The original PEP 668 regression was a host-side sudo invocation, not a
      # container build. Exercise that resolver branch with distro Python and a
      # temporary root HOME; CLI setup itself remains a non-mutating dry run.
      - name: Run sudo host setup through a managed venv
        env:
          CLI_SOURCE: ${{ github.workspace }}/holoscan-cli-src
          ROOT_HOME: ${{ runner.temp }}/holohub-root
        run: |
          root_venv="${ROOT_HOME}/.local/share/holoscan-cli/venv"
          run_as_root() {
            sudo env \
              -u HOLOSCAN_CLI_PYTHON_BIN \
              -u HOLOHUB_PYTHON_BIN \
              -u PIP_BREAK_SYSTEM_PACKAGES \
              -u PYTHONPATH \
              -u VIRTUAL_ENV \
              HOME="${ROOT_HOME}" \
              PATH="/usr/sbin:/usr/bin:/sbin:/bin" \
              HOLOSCAN_CLI_SOURCE="${CLI_SOURCE}" \
              HOLOSCAN_CLI_VENV="${root_venv}" \
              "$@"
          }
          run_as_root ./holohub env-info | tee "${RUNNER_TEMP}/root-env-info.txt"
          grep -Fq "Executable: ${root_venv}/bin/python" "${RUNNER_TEMP}/root-env-info.txt"
          run_as_root ./holohub setup --dryrun
