name: Check CLI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, holoscan-sdk-lws2]

permissions:
  contents: read

jobs:
  check-cli-py:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install the consolidated holoscan-cli from TestPyPI until the
      # release is promoted to public PyPI. The wheel ships every CLI
      # module HoloHub used to vendor under utilities/cli/, so HoloHub's
      # CI no longer needs to invoke those module paths directly.
      - name: Install consolidated holoscan-cli (dev build)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --pre \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              holoscan-cli pytest pytest-mock

      # Verify the wrapper + consolidated CLI contract on HoloHub's project
      # tree. The unittest-based suites (test_cli, test_container, ...)
      # used to live here; they now ship inside the holoscan-cli package
      # and are exercised by its own pytest matrix.
      - name: Run wrapper consolidation test
        run: python -m pytest -v --noconftest utilities/cli/tests/test_holoscan_cli_consolidation.py

  check-cli-ctest:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Configure CMake with testing enabled
        run: |
          cmake -B build -DBUILD_TESTING=ON -DBUILD_HOLOHUB_TESTING=ON .

      - name: Run CMake tests
        run: |
          cd build
          ctest --verbose
