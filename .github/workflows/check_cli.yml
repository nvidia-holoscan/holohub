name: Check CLI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, holoscan-sdk-lws2]

permissions:
  contents: read

# Pinned holoscan-cli build used by CI while the release is still on
# NVIDIA PyPI. Bump this single value to roll the version across all jobs;
# drop the index-url overrides below once the release is promoted to
# public PyPI.
env:
  HOLOSCAN_CLI_SPEC: "holoscan-cli==4.3.0rc2"
  HOLOSCAN_CLI_INDEX_URL: "https://pypi.nvidia.com"

jobs:
  check-cli-py:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install the pinned holoscan-cli from NVIDIA PyPI until the
      # release is promoted to public PyPI.
      #
      # Two-step install scopes NVIDIA PyPI to *only* the pinned holoscan-cli
      # wheel: first pull the wheel from NVIDIA PyPI with --no-deps, then
      # resolve its transitive deps + the CI test tools from public PyPI.
      # That avoids dependency-confusion risk where non-PyPI mirrors of
      # common packages could shadow PyPI ones.
      - name: Install holoscan-cli (pinned dev build)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --pre --no-deps \
              --index-url "${HOLOSCAN_CLI_INDEX_URL}" \
              "${HOLOSCAN_CLI_SPEC}"
          python -m pip install \
              --index-url https://pypi.org/simple/ \
              "${HOLOSCAN_CLI_SPEC}" pytest pytest-mock

      # Verify the wrapper + holoscan-cli contract on HoloHub's project tree.
      - name: Run wrapper consolidation test
        run: python -m pytest -v --noconftest utilities/cli/tests/test_holoscan_cli_consolidation.py

  check-cli-ctest:
    runs-on: ubuntu-22.04
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      # ctest invokes `python -m pytest` on the smoke test;
      # match the python-job install so the test actually runs rather than
      # erroring with "No module named pytest". Same two-step split as the
      # check-cli-py matrix so NVIDIA PyPI is scoped to the holoscan-cli wheel
      # only and CI test tools come from public PyPI.
      #
      # cookiecutter is required by the registered `holohub_create_module`
      # ctest (utilities/cli/tests/test_create_module.py); without it the
      # whole test class is silently skipped and the template
      # changes don't actually get exercised. The same test exercises
      # `holohub create`, which validates the generated metadata via
      # holoscan-cli's optional `[create]` extras (jsonschema, referencing);
      # installing those alongside cookiecutter keeps `validate_generated_metadata`
      # from aborting the scaffold with a [FATAL] message.
      - name: Install holoscan-cli (pinned dev build)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --pre --no-deps \
              --index-url "${HOLOSCAN_CLI_INDEX_URL}" \
              "${HOLOSCAN_CLI_SPEC}"
          python -m pip install \
              --index-url https://pypi.org/simple/ \
              "${HOLOSCAN_CLI_SPEC}" pytest pytest-mock cookiecutter \
              jsonschema referencing

      - name: Configure CMake with testing enabled
        run: |
          cmake -B build -DBUILD_TESTING=ON -DBUILD_HOLOHUB_TESTING=ON .

      - name: Run CMake tests
        run: |
          cd build
          ctest --verbose

  # Exercise the same smoke test against a *source checkout*
  # of holoscan-cli (https://github.com/nvidia-holoscan/holoscan-cli) rather
  # than the pinned NVIDIA PyPI wheel. This catches breakage when an in-flight
  # holoscan-cli change lands ahead of a new release.
  check-cli-source:
    runs-on: ubuntu-22.04
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Checkout HoloHub
        uses: actions/checkout@v4

      # Full history so poetry-dynamic-versioning can derive a version from
      # git tags when building the source checkout.
      - name: Checkout holoscan-cli source
        uses: actions/checkout@v4
        with:
          repository: nvidia-holoscan/holoscan-cli
          path: holoscan-cli-src
          fetch-depth: 0

      - name: Install holoscan-cli from source
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-mock ./holoscan-cli-src

      # ``HOLOSCAN_CLI_SOURCE`` mirrors the developer workflow documented in
      # the ``holohub`` wrapper: PYTHONPATH gets ``<source>/src`` prepended so
      # the *checkout* is imported, not the installed copy.
      - name: Run wrapper consolidation test against source checkout
        env:
          HOLOSCAN_CLI_SOURCE: ${{ github.workspace }}/holoscan-cli-src
        run: python -m pytest -v --noconftest utilities/cli/tests/test_holoscan_cli_consolidation.py
