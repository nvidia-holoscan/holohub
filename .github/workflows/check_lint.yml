name: Check linting

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, holoscan-sdk-lws2]

permissions:
  contents: read

# Pinned holoscan-cli build used by CI while the release is still on
# TestPyPI. Bump this single value to roll the version across all jobs;
# drop the index-url overrides below once the release is promoted to
# public PyPI.
env:
  HOLOSCAN_CLI_SPEC: "holoscan-cli==4.3.0a26390596878"
  HOLOSCAN_CLI_INDEX_URL: "https://test.pypi.org/simple/"

jobs:
  check-lint:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Pre-install the pinned consolidated holoscan-cli from TestPyPI so the
      # ./holohub bootstrap doesn't reach public PyPI for a stale 4.2.0
      # build that predates the ``lint`` subcommand. Revert this step to
      # ``sudo ./holohub lint --install-dependencies`` once the
      # consolidated release lands on public PyPI.
      - name: Install consolidated holoscan-cli (pinned dev build)
        run: |
          python -m pip install --upgrade pip
          sudo --preserve-env=HOLOSCAN_CLI_SPEC,HOLOSCAN_CLI_INDEX_URL \
              python -m pip install --pre \
                  --index-url "${HOLOSCAN_CLI_INDEX_URL}" \
                  --extra-index-url https://pypi.org/simple/ \
                  "${HOLOSCAN_CLI_SPEC}"

      - name: Install lint hook dependencies
        run: sudo ./holohub lint --install-dependencies

      - name: Run linter
        run: ./holohub lint
