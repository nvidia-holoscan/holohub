name: Check linting

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, holoscan-sdk-lws2]

permissions:
  contents: read

env:
  HOLOSCAN_CLI_INSTALL_ARGS: "--pre --extra-index-url https://pypi.nvidia.com holoscan-cli>4.2.0"

jobs:
  check-lint:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Pre-install holoscan-cli from NVIDIA PyPI so ./holohub bootstrap uses
      # the CLI expected by this lint workflow.
      - name: Install holoscan-cli
        run: |
          python3 -m pip install --upgrade pip
          sudo python3 -m pip install \
              ${HOLOSCAN_CLI_INSTALL_ARGS}

      - name: Install lint hook dependencies
        run: |
          sudo ./holohub lint --install-dependencies

      - name: Run linter
        run: ./holohub lint
