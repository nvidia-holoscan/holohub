---
daqiri:
  cfg:
    version: 1
    stream_type: "socket"
    protocol: "udp"
    master_core: 3
    debug: false
    log_level: "info"

    memory_regions:
    - name: "DATA_SOCKET_SERVER"
      kind: "host"
      affinity: 0
      num_bufs: 4096
      buf_size: 2048
    - name: "DATA_SOCKET_CLIENT"
      kind: "host"
      affinity: 0
      num_bufs: 4096
      buf_size: 2048

    interfaces:
    - name: "udp_server"
      address: "127.0.0.1"
      socket_config:
        mode: server
        local_ip: "127.0.0.1"
        local_port: 5001
        max_payload_size: 2048
      rx:
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 8
          batch_size: 1
          memory_regions:
          - "DATA_SOCKET_SERVER"
      tx:
        queues:
        - name: "tx_q_0"
          id: 0
          cpu_core: 8
          batch_size: 1
          memory_regions:
          - "DATA_SOCKET_SERVER"
    - name: "udp_client"
      address: "127.0.0.1"
      socket_config:
        mode: client
        local_ip: "127.0.0.1"
        local_port: 5002
        remote_ip: "127.0.0.1"
        remote_port: 5001
        max_payload_size: 2048
      rx:
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 7
          batch_size: 1
          memory_regions:
          - "DATA_SOCKET_CLIENT"
      tx:
        queues:
        - name: "tx_q_0"
          id: 0
          cpu_core: 7
          batch_size: 1
          memory_regions:
          - "DATA_SOCKET_CLIENT"

ping_rx:
  server_address: "127.0.0.1"
  server_port: 5001

ping_tx:
  client_address: "127.0.0.1"
  server_address: "127.0.0.1"
  server_port: 5001
