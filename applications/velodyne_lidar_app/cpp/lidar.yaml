---
daqiri:
  cfg:
    version: 1
    stream_type: "socket"
    master_core: 3
    debug: false
    log_level: "info"

    memory_regions:
    - name: "VELODYNE_SOCKET_RX"
      kind: "host"
      affinity: 0
      num_bufs: 128
      buf_size: 1400

    interfaces:
    - name: "velodyne_udp_server"
      address: "0.0.0.0"
      socket_config:
        mode: server
        local_addr: "udp://0.0.0.0:2368"
        max_payload_size: 1400
      rx:
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 8
          batch_size: 1
          memory_regions:
          - "VELODYNE_SOCKET_RX"

network_rx:
  server_address: "0.0.0.0"
  server_port: 2368
lidar:
  packet_buffer_size: 82
holoviz:
  name: "Lidar point cloud viewer"
  width: 500
  height: 500
  tensors:
    - name: "xyz"
      type: "points_3d"
      opacity: 1.0
      point_size: 2
