---

daqiri:
  cfg:
    version: 1
    stream_type: "socket"
    master_core: 3
    debug: false
    log_level: "info"

    memory_regions:
    - name: "PDW_SOCKET_RX"
      kind: "host"
      affinity: 0
      num_bufs: 64
      buf_size: 16400
    - name: "PDW_SOCKET_TX"
      kind: "host"
      affinity: 0
      num_bufs: 64
      buf_size: 8192

    interfaces:
    - name: "pdw_udp_server"
      address: "0.0.0.0"
      socket_config:
        mode: server
        local_addr: "udp://0.0.0.0:8999"
        max_payload_size: 16400
      rx:
        queues:
        - name: "rx_q_0"
          id: 0
          cpu_core: 8
          batch_size: 1
          memory_regions:
          - "PDW_SOCKET_RX"
    - name: "pdw_udp_client"
      address: "127.0.0.1"
      socket_config:
        mode: client
        local_addr: "udp://127.0.0.1:12347"
        remote_addr: "udp://127.0.0.1:12346"
        max_payload_size: 8192
        min_ipg_ns: 0
        retry_connect_s: 1
      tx:
        queues:
        - name: "tx_q_0"
          id: 0
          cpu_core: 8
          batch_size: 1
          memory_regions:
          - "PDW_SOCKET_TX"

pulse_detector:
  threshold: 50000
  max_pulses: 10

network_rx:
  server_address: "0.0.0.0"
  server_port: 8999

printer:
  sample_rate: 1000000000
  to_screen: true
  to_tx: false

signal_generator:
  samples_per_packet: 8192
  sample_rate: 1000000000
  chirp_starting_frequency: 0
  chirp_stopping_frequency: 3000000

network_tx:
  client_address: "127.0.0.1"
  server_address: "127.0.0.1"
  server_port: 12346
