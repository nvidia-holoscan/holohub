# Nginx config template for OpenTAKServer Web UI.
# Serves the static SPA and proxies API/WebSocket to the OTS backend.
# Rendered by start_ots.sh via envsubst before starting nginx.
# Variables: ${OTS_WEB_PORT}, ${OTS_API_PORT}

# Conditionally set Connection header: "upgrade" for WebSocket, "close" for
# regular HTTP polling (socket.io starts with polling then upgrades).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen ${OTS_WEB_PORT};
    root /var/www/html/opentakserver;
    index index.html;

    client_max_body_size 100M;

    # Proxy API requests to OTS backend
    location /api {
        proxy_pass http://127.0.0.1:${OTS_API_PORT};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO proxy (handles both HTTP long-polling and WebSocket upgrade)
    location /socket.io {
        proxy_pass http://127.0.0.1:${OTS_API_PORT}/socket.io;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback -- serve index.html for all non-matching routes
    location / {
        try_files $uri /index.html;
    }
}
