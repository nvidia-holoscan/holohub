---
replayer:
  basename: "traffic"
  frame_rate: 0
  repeat: true
  realtime: true
  count: 0

v4l2_source:
  device: "/dev/video0"
  pixel_format: "YUYV"

detection_preprocessor:
  out_tensor_name: source_video
  out_dtype: "uint8"
  resize_width: 640
  resize_height: 640

detector:
  confidence: 0.25
  imgsz: 640
  model_path: "yolov8s.pt"
  bytetrack_path: "bytetrack.yaml"

tak_cot:
  tak_host: "localhost"
  tak_port: 18088
  base_lat: 28.54770
  base_lon: -81.37942

holoviz:
